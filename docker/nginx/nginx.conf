upstream sms_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS when certs are present
    # Uncomment the block below and comment out the proxy block once SSL is configured
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://sms_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js app
    location / {
        proxy_pass              http://sms_app;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      60s;
        proxy_connect_timeout   10s;
        proxy_buffering         off;
    }
}

# HTTPS — uncomment and add your cert paths to docker/nginx/certs/
