# ── Upstream ────────────────────────────────────────────────────────────────
upstream sms_app {
    server app:3000;
    keepalive 32;
}

# ── HTTP — redirect to HTTPS (allow Let's Encrypt ACME challenges) ───────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
# Prerequisites: place your TLS certificates in docker/nginx/certs/
#   fullchain.pem — full certificate chain
#   privkey.pem   — private key
#
# Generate a self-signed cert for local testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout docker/nginx/certs/privkey.pem \
#     -out    docker/nginx/certs/fullchain.pem \
#     -subj "/CN=localhost"
#
# For production use Let's Encrypt / Certbot.
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    client_max_body_size 10m;

    access_log /var/log/nginx/sms-access.log;
    error_log  /var/log/nginx/sms-error.log;

    # ── Static assets — long-lived cache ─────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://sms_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Next.js app ──────────────────────────────────────────────────────────
    location / {
        proxy_pass            http://sms_app;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        proxy_cache_bypass    $http_upgrade;
    }
}
