services:

  # ── School Management System ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Only non-secret build args — secrets are injected at runtime below.
      args:
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    image: sms-app:latest
    container_name: sms-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # ── Session auth ─────────────────────────────────────────────────────────
      # AUTH_SECRET (or NEXTAUTH_SECRET) MUST be ≥32 chars — production throws otherwise.
      # Generate with: openssl rand -base64 32
      NEXTAUTH_URL:        ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET:     ${NEXTAUTH_SECRET}
      AUTH_SECRET:         ${AUTH_SECRET}
      # ── Microsoft Dataverse / Azure AD ───────────────────────────────────────
      DATAVERSE_URL:       ${DATAVERSE_URL}
      AZURE_TENANT_ID:     ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID:     ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      # ── Admin credentials ─────────────────────────────────────────────────────
      ADMIN_EMAIL:         ${ADMIN_EMAIL}
      ADMIN_PASSWORD:      ${ADMIN_PASSWORD}
      # ── AI (optional) ────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

  # ── Nginx reverse proxy (optional — comment out if deploying behind a cloud LB)
  nginx:
    image: nginx:1.27-alpine
    container_name: sms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - proxy
